<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Budget Visualizer</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <header>
      <h1>Expense Budget Visualizer</h1>
      <button
        id="dark-mode-toggle"
        class="btn-icon"
        aria-label="Toggle dark mode"
      >
        🌙
      </button>
    </header>

    <div class="balance-hero">
      <p class="balance-hero__label">Total Balance</p>
      <p class="balance-hero__amount" id="balance">Rp 0</p>
    </div>

    <main>
      <!-- Kiri atas: Chart -->
      <section class="chart-section">
        <div class="section-header">
          <h2>Spending by Category</h2>
        </div>
        <p id="chart-placeholder" class="chart-placeholder">
          No transactions yet. Add one to see the chart.
        </p>
        <div class="chart-canvas-wrap">
          <canvas
            id="pie-chart"
            aria-label="Spending pie chart"
            role="img"
          ></canvas>
        </div>
        <p class="chart-total-label" id="chart-total-label"></p>
      </section>

      <!-- Kanan atas: Monthly Summary -->
      <section class="summary-section">
        <div class="section-header">
          <h2>Monthly Summary</h2>
          <div class="summary-controls">
            <button
              id="btn-prev-month"
              class="btn-icon-sm"
              aria-label="Previous month"
            >
              &#8249;
            </button>
            <span id="summary-month-label" class="summary-month-label"></span>
            <button
              id="btn-next-month"
              class="btn-icon-sm"
              aria-label="Next month"
            >
              &#8250;
            </button>
          </div>
        </div>
        <!-- Budget limit setter -->
        <div class="budget-limit-row">
          <div class="input-prefix-wrap" style="flex: 1">
            <span class="input-prefix">Rp</span>
            <input
              type="text"
              id="budget-limit-display"
              inputmode="numeric"
              placeholder="Set monthly budget…"
              autocomplete="off"
            />
            <input type="hidden" id="budget-limit" />
          </div>
          <button
            type="button"
            id="btn-set-budget"
            class="btn-icon-sm"
            title="Set budget"
          >
            ✓
          </button>
          <button
            type="button"
            id="btn-clear-budget"
            class="btn-icon-sm"
            title="Clear budget"
          >
            ✕
          </button>
        </div>
        <div id="monthly-summary-content"></div>
      </section>

      <!-- Kiri bawah: Transaction list -->
      <section class="list-section">
        <div class="list-header">
          <h2>Transactions</h2>
          <div class="sort-controls">
            <label for="sort-select" class="sort-label">Sort:</label>
            <select id="sort-select" class="sort-select">
              <option value="amount-desc">Amount ↓</option>
              <option value="amount-asc">Amount ↑</option>
              <option value="category-asc">Category A–Z</option>
              <option value="entry-desc">Newest Entry ↓</option>
              <option value="entry-asc">Oldest Entry ↑</option>
              <option value="date-desc">Date Newest ↓</option>
              <option value="date-asc">Date Oldest ↑</option>
            </select>
          </div>
        </div>
        <ul id="transaction-list" aria-label="Transaction list"></ul>
      </section>

      <!-- Kanan bawah: Form -->
      <section class="form-section">
        <h2>Add Transaction</h2>
        <form id="transaction-form" novalidate>
          <div class="form-group">
            <label for="item-name">Item Name</label>
            <input
              type="text"
              id="item-name"
              name="itemName"
              placeholder="e.g. Lunch"
              autocomplete="off"
            />
            <span
              class="error-message"
              id="item-name-error"
              aria-live="polite"
            ></span>
          </div>

          <div class="form-group">
            <label for="amount-display">Amount (Rp)</label>
            <div class="input-prefix-wrap">
              <span class="input-prefix">Rp</span>
              <input
                type="text"
                id="amount-display"
                inputmode="numeric"
                placeholder="25.000"
                autocomplete="off"
              />
              <input type="hidden" id="amount" name="amount" />
            </div>
            <span
              class="error-message"
              id="amount-error"
              aria-live="polite"
            ></span>
          </div>

          <div class="form-group">
            <label for="category">Category</label>
            <div class="category-row">
              <select id="category" name="category" style="flex: 1">
                <option value="">-- Select Category --</option>
                <option value="Food">Food</option>
                <option value="Transport">Transport</option>
                <option value="Fun">Fun</option>
                <option value="__new__">+ Add new category…</option>
              </select>
              <button
                type="button"
                id="btn-manage-categories"
                class="btn-icon-sm"
                title="Manage categories"
                aria-label="Manage categories"
              >
                ⚙️
              </button>
            </div>
            <span
              class="error-message"
              id="category-error"
              aria-live="polite"
            ></span>
          </div>

          <div id="new-category-panel" class="new-category-panel" hidden>
            <div class="add-category-form">
              <input
                type="text"
                id="new-category-name"
                placeholder="Category name"
                maxlength="30"
              />
              <p class="new-cat-color-hint">
                Color assigned automatically. Change later via ⚙️ Manage.
              </p>
              <input type="hidden" id="new-category-color" value="" />
              <button type="button" id="btn-add-category" class="btn-secondary">
                Save
              </button>
            </div>
            <span
              class="error-message"
              id="category-add-error"
              aria-live="polite"
            ></span>
          </div>

          <div class="form-group">
            <label for="txn-date">Date</label>
            <input type="date" id="txn-date" name="txnDate" />
            <span
              class="error-message"
              id="date-error"
              aria-live="polite"
            ></span>
          </div>

          <button type="submit" class="btn-submit">Add Transaction</button>
        </form>
      </section>
    </main>

    <script type="module" src="js/app.js"></script>

    <!-- Edit transaction modal -->
    <div
      id="edit-modal"
      class="modal-overlay"
      hidden
      aria-modal="true"
      role="dialog"
      aria-labelledby="edit-modal-title"
    >
      <div class="modal-card">
        <h3 id="edit-modal-title">Edit Transaction</h3>
        <form id="edit-form" novalidate>
          <input type="hidden" id="edit-id" />
          <div class="form-group">
            <label for="edit-item-name">Item Name</label>
            <input type="text" id="edit-item-name" autocomplete="off" />
            <span class="error-message" id="edit-item-name-error"></span>
          </div>
          <div class="form-group">
            <label for="edit-amount-display">Amount (Rp)</label>
            <div class="input-prefix-wrap">
              <span class="input-prefix">Rp</span>
              <input type="text" id="edit-amount-display" inputmode="numeric" />
              <input type="hidden" id="edit-amount" />
            </div>
            <span class="error-message" id="edit-amount-error"></span>
          </div>
          <div class="form-group">
            <label for="edit-category">Category</label>
            <select id="edit-category"></select>
            <span class="error-message" id="edit-category-error"></span>
          </div>
          <div class="form-group">
            <label for="edit-date">Date</label>
            <input type="date" id="edit-date" />
          </div>
          <div class="modal-actions">
            <button type="button" id="btn-edit-cancel" class="btn-secondary">
              Cancel
            </button>
            <button type="submit" class="btn-submit" style="flex: 1">
              Save
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Manage categories modal -->
    <div
      id="manage-cat-modal"
      class="modal-overlay"
      hidden
      aria-modal="true"
      role="dialog"
      aria-labelledby="manage-cat-title"
    >
      <div class="modal-card">
        <h3 id="manage-cat-title">Manage Categories</h3>
        <div id="manage-cat-list" class="manage-cat-list"></div>
        <div class="modal-actions" style="margin-top: 1rem">
          <button
            type="button"
            id="btn-manage-cat-close"
            class="btn-secondary"
            style="flex: 1"
          >
            Close
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
